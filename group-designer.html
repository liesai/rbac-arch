<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Designer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-6xl p-6 space-y-4">
    <h1 class="text-2xl font-bold text-indigo-700">User Group Designer</h1>
    <p id="authInfo" class="text-sm text-slate-600"></p>

    <section class="rounded-xl border border-slate-200 bg-white p-4 space-y-3">
      <h2 class="font-semibold">Nouveau draft groupe</h2>
      <div class="grid grid-cols-1 gap-3 md:grid-cols-4">
        <select id="domain" class="rounded border border-slate-300 px-3 py-2 text-sm"></select>
        <select id="group_type" class="rounded border border-slate-300 px-3 py-2 text-sm">
          <option>USR</option><option>ADM</option><option>SEC</option>
        </select>
        <input id="owner" class="rounded border border-slate-300 px-3 py-2 text-sm" placeholder="owner@contoso.com" />
        <input id="scope" class="rounded border border-slate-300 px-3 py-2 text-sm" value="/subscriptions/sub-prod-001" />
      </div>
      <div id="dynamicVars" class="grid grid-cols-1 gap-3 md:grid-cols-4"></div>
      <div class="grid grid-cols-1 gap-3 md:grid-cols-2">
        <input id="tags" class="rounded border border-slate-300 px-3 py-2 text-sm" placeholder="tags k=v,k=v (ex: env=prd,criticality=high,cost_center=eng,purpose=api)" />
        <input id="display_name" class="rounded border border-slate-300 px-3 py-2 text-sm" placeholder="Display name (optionnel)" />
      </div>
      <div class="flex flex-wrap items-center gap-2">
        <button id="previewBtn" class="rounded bg-slate-800 px-3 py-2 text-sm text-white">Preview Name</button>
        <button id="loadRolesBtn" class="rounded border border-slate-300 px-3 py-2 text-sm">Load Allowed Roles</button>
        <button id="validateBtn" class="rounded bg-indigo-600 px-3 py-2 text-sm text-white">Validate</button>
        <button id="addDraftBtn" class="rounded bg-emerald-600 px-3 py-2 text-sm text-white">Add Draft</button>
      </div>
      <p id="previewText" class="text-sm text-slate-700"></p>
      <div>
        <label class="mb-1 block text-sm font-medium">Allowed roles</label>
        <div id="rolesBox" class="grid grid-cols-1 gap-2 sm:grid-cols-2"></div>
      </div>
      <pre id="validation" class="rounded border border-slate-200 bg-slate-50 p-3 text-xs"></pre>
    </section>

    <section class="rounded-xl border border-slate-200 bg-white p-4 space-y-3">
      <h2 class="font-semibold">Drafts</h2>
      <div id="draftTable" class="text-sm text-slate-600">No drafts yet.</div>
      <div class="flex gap-2">
        <button id="exportJsonBtn" class="rounded bg-indigo-600 px-3 py-2 text-sm text-white">Export JSON</button>
        <button id="exportCsvBtn" class="rounded border border-slate-300 px-3 py-2 text-sm">Export CSV</button>
        <button id="clearBtn" class="rounded border border-slate-300 px-3 py-2 text-sm">Clear drafts</button>
        <a href="/policy-admin.html" class="rounded border border-slate-300 px-3 py-2 text-sm">Policy Admin</a>
      </div>
    </section>
  </main>

  <script>
    const api = '/api';
    let policyMeta = { variables: [], domains: {}, default_domain: 'ENG' };
    let drafts = [];

    const authInfoEl = document.getElementById('authInfo');
    const rolesBox = document.getElementById('rolesBox');
    const validationEl = document.getElementById('validation');
    const previewTextEl = document.getElementById('previewText');

    function tagsToObj(raw) {
      const out = {};
      for (const p of (raw || '').split(',')) {
        const item = p.trim();
        if (!item) continue;
        if (item.includes('=')) {
          const [k, v] = item.split('=', 2);
          if (k.trim()) out[k.trim()] = (v || '').trim();
        } else {
          out[item] = 'true';
        }
      }
      return out;
    }

    function getVarValues() {
      const vals = {};
      document.querySelectorAll('[data-var-key]').forEach((el) => {
        vals[el.getAttribute('data-var-key')] = (el.value || '').trim();
      });
      return vals;
    }

    function selectedRoles() {
      return Array.from(document.querySelectorAll('input[name="role_chk"]:checked')).map((n) => n.value);
    }

    function currentDraft() {
      const tags = tagsToObj(document.getElementById('tags').value);
      const vars = getVarValues();
      return {
        group_id: vars.group_id || '',
        display_name: document.getElementById('display_name').value.trim(),
        domain: document.getElementById('domain').value,
        group_type: document.getElementById('group_type').value,
        owner: document.getElementById('owner').value.trim(),
        scope: document.getElementById('scope').value.trim() || '/',
        tags,
        role_assignments: selectedRoles(),
        members_count: 0,
        last_review_days: 0,
      };
    }

    function renderDrafts() {
      const box = document.getElementById('draftTable');
      if (!drafts.length) {
        box.textContent = 'No drafts yet.';
        return;
      }
      box.innerHTML = `<table class="min-w-full border-collapse"><thead><tr class="text-left text-xs uppercase text-slate-500"><th class="p-2">Group</th><th class="p-2">Domain</th><th class="p-2">Type</th><th class="p-2">Roles</th></tr></thead><tbody>${drafts.map((d) => `<tr class="border-t border-slate-200"><td class="p-2">${d.group_id || d.display_name}</td><td class="p-2">${d.domain}</td><td class="p-2">${d.group_type}</td><td class="p-2">${(d.role_assignments || []).join(', ')}</td></tr>`).join('')}</tbody></table>`;
    }

    function triggerDownload(filename, content) {
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function loadAuth() {
      const res = await fetch(`${api}/auth/me`);
      const body = await res.json();
      const ctx = body.context || {};
      authInfoEl.textContent = `User: ${ctx.user || 'anonymous'} | Role: ${ctx.role || 'none'} | Access control: ${ctx.access_control_enabled ? 'enabled' : 'disabled'}`;
    }

    async function loadPolicyDomains() {
      const res = await fetch(`${api}/policy/domains`);
      const body = await res.json();
      if (!res.ok) {
        validationEl.textContent = JSON.stringify(body, null, 2);
        return;
      }
      policyMeta = body;
      const domainSelect = document.getElementById('domain');
      const domains = Object.keys(body.domains || {});
      domainSelect.innerHTML = domains.map((d) => `<option>${d}</option>`).join('');
      domainSelect.value = body.default_domain || domains[0] || 'ENG';

      const varContainer = document.getElementById('dynamicVars');
      const vars = (body.variables || []).filter((v) => v.key !== 'domain');
      varContainer.innerHTML = vars.map((v) => `<input data-var-key="${v.key}" class="rounded border border-slate-300 px-3 py-2 text-sm" placeholder="${v.key}" />`).join('');
    }

    async function previewName() {
      const payload = {
        domain: document.getElementById('domain').value,
        values: getVarValues(),
      };
      const res = await fetch(`${api}/policy/naming/preview`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const body = await res.json();
      previewTextEl.textContent = body.preview ? `Generated: ${body.preview.group_name} | valid=${body.preview.valid}` : JSON.stringify(body);
      if (body.preview?.group_name) {
        const display = document.getElementById('display_name');
        if (!display.value.trim()) display.value = body.preview.group_name;
      }
    }

    async function loadAllowedRoles() {
      const gt = document.getElementById('group_type').value;
      const scope = document.getElementById('scope').value.trim() || '/';
      const domain = document.getElementById('domain').value;
      const res = await fetch(`${api}/policy/allowed-roles?group_type=${encodeURIComponent(gt)}&scope=${encodeURIComponent(scope)}&domain=${encodeURIComponent(domain)}`);
      const body = await res.json();
      const roles = body.allowed_roles || [];
      rolesBox.innerHTML = roles.map((r) => `<label class="flex items-center gap-2 rounded border border-slate-200 bg-slate-50 px-2 py-1 text-sm"><input type="checkbox" name="role_chk" value="${r}" /> ${r}</label>`).join('');
    }

    async function validateDraft() {
      const draft = currentDraft();
      const res = await fetch(`${api}/policy/validate-group`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(draft),
      });
      const body = await res.json();
      if (body.validation?.suggested_group_id && !draft.group_id) {
        draft.group_id = body.validation.suggested_group_id;
      }
      validationEl.textContent = JSON.stringify(body, null, 2);
      return { draft, body };
    }

    document.getElementById('previewBtn').addEventListener('click', previewName);
    document.getElementById('loadRolesBtn').addEventListener('click', loadAllowedRoles);
    document.getElementById('validateBtn').addEventListener('click', validateDraft);

    document.getElementById('addDraftBtn').addEventListener('click', async () => {
      const { draft, body } = await validateDraft();
      if (body.validation?.suggested_group_id && !draft.group_id) draft.group_id = body.validation.suggested_group_id;
      if (!draft.group_id) draft.group_id = draft.display_name || `DRAFT-${drafts.length + 1}`;
      drafts.push(draft);
      renderDrafts();
    });

    async function exportDrafts(fmt) {
      if (!drafts.length) return;
      const res = await fetch(`${api}/policy/groups/export`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ groups: drafts, output_format: fmt }),
      });
      const body = await res.json();
      if (!res.ok) {
        validationEl.textContent = JSON.stringify(body, null, 2);
        return;
      }
      const content = fmt === 'csv' ? body.content : JSON.stringify(body.content, null, 2);
      triggerDownload(body.filename || `groups.${fmt}`, content);
    }

    document.getElementById('exportJsonBtn').addEventListener('click', () => exportDrafts('json'));
    document.getElementById('exportCsvBtn').addEventListener('click', () => exportDrafts('csv'));
    document.getElementById('clearBtn').addEventListener('click', () => { drafts = []; renderDrafts(); });

    loadAuth();
    loadPolicyDomains();
    renderDrafts();
  </script>
</body>
</html>
